; Mini-project: USB Audio Synthesizer (ESP32-S3)
;
; Uses espressif/usb_device_uac component from esp-iot-solution.
; Device appears as a USB microphone — open Audacity or any DAW,
; select "ESP32-S3" as input, and hear the sine wave.
;
; Wiring:
;   GPIO10 wiper -> frequency pot (50 Hz – 4 kHz)
;   GPIO11 wiper -> amplitude pot
;   Both pots: left -> GND, right -> 3.3V

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi

build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DCONFIG_TINYUSB_MIDI_ENABLED=1
